name: primary-stack

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  arpego:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: arpego
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: arpego/go.mod
          cache-dependency-path: arpego/go.sum

      - name: Check formatting
        run: |
          unformatted="$(find . -name '*.go' -type f -exec gofmt -l {} +)"
          if [ -n "$unformatted" ]; then
            echo "Go files need formatting:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          working-directory: arpego

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

  libretto:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: libretto
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: libretto/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
