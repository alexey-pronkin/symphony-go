name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  repo-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.68.2

      - name: Trivy repo scan
        id: repo_scan
        shell: bash
        run: |
          set +e
          trivy fs \
            --config trivy.yaml \
            --format sarif \
            --output trivy-repo.sarif \
            .
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload repo scan SARIF
        if: ${{ always() && hashFiles('trivy-repo.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-repo.sarif

      - name: Fail repo scan on findings or scanner error
        if: ${{ steps.repo_scan.outputs.status != '0' }}
        run: exit "${{ steps.repo_scan.outputs.status }}"

  config-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.68.2

      - name: Trivy config scan
        id: config_scan
        shell: bash
        run: |
          set +e
          trivy config \
            --quiet \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-config.sarif \
            .
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload config scan SARIF
        if: ${{ always() && hashFiles('trivy-config.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif

      - name: Fail config scan on findings or scanner error
        if: ${{ steps.config_scan.outputs.status != '0' }}
        run: exit "${{ steps.config_scan.outputs.status }}"

  image-scan:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: arpego
            context: ./arpego
            image: symphony-go/arpego:ci
          - name: libretto
            context: ./libretto
            image: symphony-go/libretto:ci
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.68.2

      - name: Build ${{ matrix.name }} image
        run: docker build -t ${{ matrix.image }} ${{ matrix.context }}

      - name: Trivy image scan
        id: image_scan
        shell: bash
        run: |
          set +e
          trivy image \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-${{ matrix.name }}.sarif \
            ${{ matrix.image }}
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload image scan SARIF
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Fail image scan on findings or scanner error
        if: ${{ steps.image_scan.outputs.status != '0' }}
        run: exit "${{ steps.image_scan.outputs.status }}"
