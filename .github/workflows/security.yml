name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  repo-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Trivy CLI
        shell: bash
        run: |
          set -euo pipefail
          version="0.69.3"
          archive="trivy_${version}_Linux-64bit.tar.gz"
          base_url="https://github.com/aquasecurity/trivy/releases/download/v${version}"
          curl -fsSL -o "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSL -o "$RUNNER_TEMP/trivy-checksums.txt" "$base_url/trivy_${version}_checksums.txt"
          checksum=$(awk '/  '"$archive"'$/ { print $1 }' "$RUNNER_TEMP/trivy-checksums.txt")
          test -n "$checksum"
          echo "$checksum  $RUNNER_TEMP/$archive" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/trivy-bin"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/trivy-bin" trivy
          echo "$RUNNER_TEMP/trivy-bin" >> "$GITHUB_PATH"

      - name: Trivy repo scan
        id: repo_scan
        shell: bash
        run: |
          set +e
          trivy fs \
            --config trivy.yaml \
            --format sarif \
            --output trivy-repo.sarif \
            .
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload repo scan SARIF
        if: ${{ always() && hashFiles('trivy-repo.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-repo.sarif
          category: trivy-repo

      - name: Fail repo scan on findings or scanner error
        if: ${{ steps.repo_scan.outputs.status != '0' }}
        run: exit "${{ steps.repo_scan.outputs.status }}"

  config-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Trivy CLI
        shell: bash
        run: |
          set -euo pipefail
          version="0.69.3"
          archive="trivy_${version}_Linux-64bit.tar.gz"
          base_url="https://github.com/aquasecurity/trivy/releases/download/v${version}"
          curl -fsSL -o "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSL -o "$RUNNER_TEMP/trivy-checksums.txt" "$base_url/trivy_${version}_checksums.txt"
          checksum=$(awk '/  '"$archive"'$/ { print $1 }' "$RUNNER_TEMP/trivy-checksums.txt")
          test -n "$checksum"
          echo "$checksum  $RUNNER_TEMP/$archive" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/trivy-bin"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/trivy-bin" trivy
          echo "$RUNNER_TEMP/trivy-bin" >> "$GITHUB_PATH"

      - name: Trivy config scan
        id: config_scan
        shell: bash
        run: |
          set +e
          trivy config \
            --quiet \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-config.sarif \
            .
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload config scan SARIF
        if: ${{ always() && hashFiles('trivy-config.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail config scan on findings or scanner error
        if: ${{ steps.config_scan.outputs.status != '0' }}
        run: exit "${{ steps.config_scan.outputs.status }}"

  image-scan:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arpego
            context: ./arpego
            image: symphony-go/arpego:ci
          - name: libretto
            context: ./libretto
            image: symphony-go/libretto:ci
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Trivy CLI
        shell: bash
        run: |
          set -euo pipefail
          version="0.69.3"
          archive="trivy_${version}_Linux-64bit.tar.gz"
          base_url="https://github.com/aquasecurity/trivy/releases/download/v${version}"
          curl -fsSL -o "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSL -o "$RUNNER_TEMP/trivy-checksums.txt" "$base_url/trivy_${version}_checksums.txt"
          checksum=$(awk '/  '"$archive"'$/ { print $1 }' "$RUNNER_TEMP/trivy-checksums.txt")
          test -n "$checksum"
          echo "$checksum  $RUNNER_TEMP/$archive" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/trivy-bin"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/trivy-bin" trivy
          echo "$RUNNER_TEMP/trivy-bin" >> "$GITHUB_PATH"

      - name: Build ${{ matrix.name }} image
        run: docker build -t ${{ matrix.image }} ${{ matrix.context }}

      - name: Trivy image scan
        id: image_scan
        shell: bash
        run: |
          set +e
          trivy image \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-${{ matrix.name }}.sarif \
            ${{ matrix.image }}
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload image scan SARIF
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

      - name: Fail image scan on findings or scanner error
        if: ${{ steps.image_scan.outputs.status != '0' }}
        run: exit "${{ steps.image_scan.outputs.status }}"
