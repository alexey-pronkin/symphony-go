name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  repo-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trivy repo scan
        id: repo_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: sarif
          output: trivy-repo.sarif

      - name: Upload repo scan SARIF
        if: ${{ always() && hashFiles('trivy-repo.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-repo.sarif
          category: trivy-repo

      - name: Fail repo scan on findings or scanner error
        if: ${{ steps.repo_scan.outcome == 'failure' }}
        run: exit 1

  config-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan
        id: config_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-config.sarif

      - name: Upload config scan SARIF
        if: ${{ always() && hashFiles('trivy-config.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail config scan on findings or scanner error
        if: ${{ steps.config_scan.outcome == 'failure' }}
        run: exit 1

  image-scan:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arpego
            context: ./arpego
            image: symphony-go/arpego:ci
          - name: libretto
            context: ./libretto
            image: symphony-go/libretto:ci
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        run: docker build -t ${{ matrix.image }} ${{ matrix.context }}

      - name: Trivy image scan
        id: image_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-${{ matrix.name }}.sarif

      - name: Upload image scan SARIF
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

      - name: Fail image scan on findings or scanner error
        if: ${{ steps.image_scan.outcome == 'failure' }}
        run: exit 1
